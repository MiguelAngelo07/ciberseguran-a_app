<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cadastrar Informação · Sistema de Classificação</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-narrow">

    <a href="index.html" class="back-link">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
      </svg>
      Voltar ao Dashboard
    </a>

    <div class="form-card">
      <!-- Header -->
      <div class="section-header">
        <div class="icon-wrap">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <ellipse cx="12" cy="5" rx="9" ry="3"/>
            <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
            <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
          </svg>
        </div>
        <div>
          <h2>Cadastrar Informação</h2>
        </div>
      </div>
      <p style="color:var(--text-secondary);font-size:0.9rem;margin-left:56px;margin-bottom:28px;">
        Adicione uma nova informação ao sistema
      </p>

      <!-- Form -->
      <div class="form-group">
        <label for="nome">Nome da Informação</label>
        <input type="text" id="nome" placeholder="Ex: Dados de clientes 2026" />
      </div>

      <div class="form-group">
        <label for="descricao">Descrição</label>
        <textarea id="descricao" placeholder="Descreva a informação..."></textarea>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="tipo">Tipo de Informação</label>
          <select id="tipo">
            <option value="" disabled selected>Selecione...</option>
            <option>Dado Pessoal</option>
            <option>Dado Financeiro</option>
            <option>Dado Técnico</option>
            <option>Dado Operacional</option>
            <option>Dado Público</option>
          </select>
        </div>
        <div class="form-group">
          <label for="formato">Formato</label>
          <select id="formato">
            <option value="" disabled selected>Selecione...</option>
            <option>Digital</option>
            <option>Físico</option>
            <option>Híbrido</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="proprietario">Proprietário</label>
          <input type="text" id="proprietario" placeholder="Departamento ou pessoa responsável" />
        </div>
        <div class="form-group">
          <label for="localizacao">Localização</label>
          <input type="text" id="localizacao" placeholder="Ex: Servidor AWS, Arquivo físico sala 203" />
        </div>
      </div>

      <button class="btn-primary" onclick="cadastrar()">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <ellipse cx="12" cy="5" rx="9" ry="3"/>
          <path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/>
          <path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
        </svg>
        Cadastrar Informação
      </button>
    </div>

  </main>

  <script>
    function cadastrar() {
      const nome = document.getElementById('nome').value.trim();
      if (!nome) {
        alert('Por favor, informe o nome da informação.');
        return;
      }
      alert('Informação "' + nome + '" cadastrada com sucesso!');
    }
  </script>
</body>
</html>
